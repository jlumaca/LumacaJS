<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - BuyCars UY</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="card shadow p-4" style="width: 350px;">
    <h3 class="text-center mb-3">Registro</h3>

    <input type="text" id="reg_user" class="form-control mb-2" placeholder="Usuario">
    <input type="password" id="reg_pass" class="form-control mb-3" placeholder="Contraseña">

    <button onclick="registrar()" class="btn btn-success w-100">Registrarse</button>

    <p id="reg_msg" class="mt-2 text-center"></p>

    <p class="text-center mt-3">
        <a href="login.html">Volver al login</a>
    </p>
</div>

<script src="js/main.js"></script>
</body>
</html>
