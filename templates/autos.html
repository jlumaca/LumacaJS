<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Autos - BuyCars UY</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Autos</h2>
        <button id="btnLogout" class="btn btn-danger">Cerrar sesión</button>
    </div>
    <form id="formAuto">
        <div class="card p-3 mb-3 shadow-sm">
            <div class="row g-2">
                <div class="col-md-2">
                    <input type="text" id="codigo" class="form-control" placeholder="Código">
                </div>
                <div class="col-md-2">
                    <input type="text" id="marca" class="form-control" placeholder="Marca">
                </div>
                <div class="col-md-2">
                    <input type="text" id="modelo" class="form-control" placeholder="Modelo">
                </div>
                <div class="col-md-2">
                    <input type="text" id="motor" class="form-control" placeholder="Motor">
                </div>
                <div class="col-md-2">
                    <input type="number" id="precio" class="form-control" placeholder="Precio">
                </div>
                <div class="col-md-2">
                    <input type="file" id="foto" class="form-control">
                </div>
            </div>

            <div class="mt-3">
                <img id="preview" width="120" class="img-thumbnail d-none">
            </div>
            <div class="mt-3 d-flex gap-2 flex-wrap">
                <button type="button" id="btnAgregar" class="btn btn-success">Agregar</button>
                <button type="button" id="btnModificar" class="btn btn-warning">Modificar</button>
                <button type="button" id="btnBuscar" class="btn btn-info">Buscar</button>
                <button type="button" id="btnRecargar" class="btn btn-secondary">Ver todos</button>
            </div>

            <p id="auto_msg" class="mt-2"></p>
        </div>
    </form>
    <div class="card p-3 mb-3 shadow-sm">
        <input type="text" id="busqueda" class="form-control" placeholder="🔍 Buscar por marca o modelo">
    </div>
    <div class="card shadow-sm">
        <table class="table table-striped table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Código</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Motor</th>
                    <th>Precio</th>
                    <th>Foto</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla_autos"></tbody>
        </table>
    </div>

</div>

<script src="../js/main.js"></script>
</body>
</html>
